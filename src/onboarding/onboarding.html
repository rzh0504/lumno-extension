<!doctype html>
<html lang="en" class="notranslate" translate="no" notranslate data-no-translate="true">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumno Onboarding</title>
    <link rel="stylesheet" href="../../assets/fonts/open-sans/open-sans.css" />
    <link rel="stylesheet" href="../../assets/remixicon/fonts/remixicon.css" />
    <link rel="stylesheet" href="../shared/tooltip.css" />
    <link rel="stylesheet" href="../shared/search-input.css" />
    <link rel="stylesheet" href="../overlay/suggestions-view.css" />
    <style>
      :root {
        --page-bg: #f3f5f7;
        --page-bg-fill-top: #fbfcfd;
        --page-bg-fill-bottom: #eef2f5;
        --page-ink: #111827;
        --page-muted: #6b7280;
        --page-soft: #eef1f5;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --surface-border: rgba(17, 24, 39, 0.1);
        --accent-blue: #2563eb;
        --accent-green: #059669;
        --accent-amber: #d97706;
        --accent-rose: #e11d48;
        --shadow-shell: 0 32px 64px -34px rgba(15, 23, 42, 0.22);
        --radius: 8px;
        --resize-dur: 300ms;
        --resize-ease: cubic-bezier(0.22, 1, 0.36, 1);
        --text-swap-dur: 200ms;
        --text-swap-translate-y: 8px;
        --text-swap-blur: 2px;
        --text-swap-ease: ease-out;
        --panel-open-dur: 400ms;
        --panel-close-dur: 350ms;
        --panel-translate-y: 100px;
        --panel-blur: 2px;
        --panel-ease: cubic-bezier(0.22, 1, 0.36, 1);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --page-bg: #111111;
          --page-ink: #f3f4f6;
          --page-muted: #9ca3af;
          --page-soft: #1d1d1d;
          --surface: #191919;
          --surface-soft: #202020;
          --surface-border: rgba(255, 255, 255, 0.12);
          --shadow-shell: 0 34px 68px -34px rgba(0, 0, 0, 0.56);
          --page-bg-fill-top: #171717;
          --page-bg-fill-bottom: #0f0f0f;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, var(--page-bg-fill-top) 0%, var(--page-bg) 48%, var(--page-bg-fill-bottom) 100%);
        color: var(--page-ink);
        font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        overflow: hidden;
      }

      button {
        font: inherit;
      }

      .ri-icon {
        width: var(--ri-size, 16px);
        height: var(--ri-size, 16px);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        font-size: var(--ri-size, 16px);
        flex-shrink: 0;
        font-style: normal;
        font-variant: normal;
        text-transform: none;
      }

      button .ri-icon,
      a .ri-icon,
      [role="button"] .ri-icon {
        cursor: inherit;
        pointer-events: none;
      }

      .ri-icon::before {
        font-style: normal;
        font-variant: normal;
        text-transform: none;
      }

      .ri-size-8 { --ri-size: 8px; }
      .ri-size-12 { --ri-size: 12px; }
      .ri-size-14 { --ri-size: 14px; }
      .ri-size-16 { --ri-size: 16px; }
      .ri-size-20 { --ri-size: 20px; }
      .ri-size-24 { --ri-size: 24px; }
      .ri-size-28 { --ri-size: 28px; }

      .onboarding-shell {
        --onboarding-shell-padding-x: clamp(16px, 3.4vw, 42px);
        --onboarding-shell-padding-y: clamp(16px, 4.5vh, 32px);
        --onboarding-shell-lift-y: clamp(14px, 2.4vh, 24px);
        --onboarding-frame-width: 1240px;
        --onboarding-frame-height: 680px;
        --onboarding-frame-radius: 24px;
        --onboarding-frame-scale: 1;
        --onboarding-frame-rendered-width: var(--onboarding-frame-width);
        --onboarding-frame-rendered-height: var(--onboarding-frame-height);
        --onboarding-visual-max-width: 704px;
        --onboarding-visual-min-width: 420px;
        --onboarding-visual-canvas-width: 704px;
        --onboarding-visual-canvas-height: 680px;
        --onboarding-visual-ratio: 704 / 680;
        --onboarding-visual-scale: 1;
        --onboarding-visual-rendered-width: var(--onboarding-visual-canvas-width);
        --onboarding-visual-rendered-height: var(--onboarding-visual-canvas-height);
        position: relative;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        margin: 0 auto;
        padding:
          max(16px, calc(var(--onboarding-shell-padding-y) - var(--onboarding-shell-lift-y)))
          var(--onboarding-shell-padding-x)
          calc(var(--onboarding-shell-padding-y) + var(--onboarding-shell-lift-y));
        display: grid;
        grid-template-rows: auto;
        place-items: center;
        overflow: auto;
      }

      .onboarding-frame {
        position: relative;
        width: min(1240px, 100%);
        height: min(680px, 100%);
        min-height: min(560px, 100%);
        max-height: 680px;
        border: 0;
        border-radius: var(--onboarding-frame-radius);
        background: var(--surface);
        box-shadow: var(--shadow-shell);
        overflow: clip;
        display: grid;
        grid-template-columns: minmax(340px, 1fr) minmax(var(--onboarding-visual-min-width), var(--onboarding-visual-max-width));
        grid-template-rows: minmax(0, 1fr);
        transform: scale(var(--onboarding-frame-scale, 1));
        transform-origin: center;
        transition: transform 220ms var(--resize-ease);
        will-change: transform;
      }

      .copy-panel {
        --onboarding-copy-padding-x: 56px;
        --onboarding-copy-padding-y: 56px;
        --onboarding-copy-row-gap: clamp(22px, 4.8vh, 32px);
        position: relative;
        min-width: 0;
        min-height: 0;
        padding: var(--onboarding-copy-padding-y) var(--onboarding-copy-padding-x);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        align-content: stretch;
        gap: var(--onboarding-copy-row-gap);
        border-right: 0;
        background: var(--surface);
      }

      .onboarding-newtab-watermark {
        position: absolute;
        left: var(--onboarding-copy-padding-x);
        top: var(--onboarding-copy-padding-y);
        z-index: 1;
        width: 118px;
        height: 27px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        opacity: 0.78;
        transform: translateY(12px);
      }

      .onboarding-shell:not([data-active-slide="intro"]) .onboarding-newtab-watermark {
        display: none;
      }

      .onboarding-newtab-watermark__solid {
        position: absolute;
        inset: 0;
        z-index: 0;
        background: rgba(31, 41, 55, 0.14);
        -webkit-mask: url("../../assets/images/lumno-wordmark-mask.svg") center / contain no-repeat;
        mask: url("../../assets/images/lumno-wordmark-mask.svg") center / contain no-repeat;
        opacity: 0;
        pointer-events: none;
      }

      .onboarding-newtab-watermark__image {
        position: relative;
        z-index: 1;
        width: 118px;
        height: auto;
        display: block;
        opacity: 1;
        pointer-events: none;
      }

      @media (prefers-color-scheme: dark) {
        .onboarding-newtab-watermark {
          opacity: 0.72;
        }

        .onboarding-newtab-watermark__solid {
          background: rgba(248, 250, 252, 0.24);
          opacity: 1;
        }

        .onboarding-newtab-watermark__image {
          opacity: 0;
        }
      }

      .copy-block {
        --onboarding-copy-block-gap: clamp(20px, 4vh, 28px);
        min-height: 0;
        display: grid;
        align-content: start;
        gap: var(--onboarding-copy-block-gap);
      }

      .onboarding-shell[data-active-slide="intro"] .copy-block {
        padding-top: 18px;
      }

      .page-strip {
        --page-strip-track: rgba(17, 24, 39, 0.045);
        --page-strip-active: rgba(17, 24, 39, 0.14);
        --page-strip-hover: rgba(17, 24, 39, 0.085);
        --page-strip-active-hover: rgba(17, 24, 39, 0.18);
        --page-strip-focus: rgba(17, 24, 39, 0.16);
        width: min(280px, 100%);
        display: grid;
        grid-template-columns: repeat(var(--page-strip-count, 4), minmax(0, 1fr));
        gap: 4px;
        align-self: start;
        margin: 0 0 clamp(18px, 3.4vh, 28px);
      }

      .page-strip[hidden] {
        display: none;
      }

      .page-strip-segment {
        all: unset;
        box-sizing: border-box;
        display: block;
        height: 5px;
        border-radius: 999px;
        cursor: pointer;
        background: var(--page-strip-track);
        transition:
          background 160ms ease,
          box-shadow 160ms ease;
      }

      .page-strip-segment[data-active="true"] {
        background: var(--page-strip-active);
      }

      .page-strip-segment:hover {
        background: var(--page-strip-hover);
      }

      .page-strip-segment[data-active="true"]:hover {
        background: var(--page-strip-active-hover);
      }

      .page-strip-segment:focus-visible {
        outline: 2px solid var(--page-strip-focus);
        outline-offset: 3px;
      }

      .page-strip[data-entering="true"] {
        animation: onboarding-page-strip-enter 360ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .page-strip[data-entering="true"] .page-strip-segment {
        transform-origin: left center;
        animation: onboarding-page-strip-segment-enter 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
        animation-delay: calc(80ms + var(--page-strip-segment-index, 0) * 55ms);
      }

      @keyframes onboarding-page-strip-enter {
        from {
          opacity: 0;
          filter: blur(2px);
          transform: translateY(-6px);
        }

        to {
          opacity: 1;
          filter: blur(0);
          transform: translateY(0);
        }
      }

      @keyframes onboarding-page-strip-segment-enter {
        from {
          opacity: 0;
          filter: blur(1px);
          transform: scaleX(0.18);
        }

        to {
          opacity: 1;
          filter: blur(0);
          transform: scaleX(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .page-strip[data-entering="true"],
        .page-strip[data-entering="true"] .page-strip-segment {
          animation: none;
        }
      }

      @media (prefers-color-scheme: dark) {
        .page-strip {
          --page-strip-track: rgba(255, 255, 255, 0.08);
          --page-strip-active: rgba(255, 255, 255, 0.22);
          --page-strip-hover: rgba(255, 255, 255, 0.14);
          --page-strip-active-hover: rgba(255, 255, 255, 0.3);
          --page-strip-focus: rgba(255, 255, 255, 0.22);
        }
      }

      .eyebrow,
      .title,
      .body-copy {
        margin: 0;
      }

      .eyebrow {
        min-height: 18px;
        color: var(--accent-green);
        font-size: 13px;
        font-weight: 760;
      }

      .title {
        --title-base-size: 36px;
        --title-fit-scale: 1;
        --title-font-weight: 760;
        --title-font-stretch: 100%;
        --title-font-width-axis: 100;
        --title-line-gap: 0px;
        max-width: min(560px, 100%);
        min-height: 0;
        font-size: calc(var(--title-base-size) * var(--title-fit-scale));
        line-height: 1.24;
        font-weight: var(--title-font-weight);
        font-stretch: var(--title-font-stretch);
        font-variation-settings: "wdth" var(--title-font-width-axis);
        letter-spacing: 0;
      }

      html[lang="en"] .title {
        --title-font-weight: 620;
        --title-font-stretch: 94%;
        --title-font-width-axis: 94;
      }

      html[lang="en"] .onboarding-shell[data-active-slide="intro"] .title {
        --title-line-gap: 0.1em;
      }

      .title-line {
        display: inline-block;
        max-width: 100%;
        white-space: nowrap;
      }

      .title-line--rotating {
        display: inline-flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 0 0.16em;
        white-space: nowrap;
      }

      .title-line--with-logo {
        display: inline-flex;
        align-items: center;
        gap: 0.18em;
        white-space: nowrap;
      }

      .title-logo-mark {
        --title-logo-mark-offset-y: 0px;
        width: 1.08em;
        height: 1.08em;
        flex: 0 0 auto;
        border-radius: 0.22em;
        object-fit: contain;
        filter: drop-shadow(0 7px 8px rgba(56, 172, 248, 0.38));
        transform: translateY(var(--title-logo-mark-offset-y)) rotate(7deg);
        transform-origin: center;
      }

      html[lang="en"] .onboarding-shell[data-active-slide="intro"] .title-logo-mark {
        --title-logo-mark-offset-y: 0.08em;
      }

      .title-break {
        display: block;
        height: var(--title-line-gap);
      }

      .title-rotator {
        --title-rotator-bg: #fef3c7;
        --title-rotator-ink: #d97706;
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        width: max-content;
        min-height: 1.14em;
        padding: 0.14em 0.16em 0.16em;
        border-radius: 8px;
        background: var(--title-rotator-bg);
        color: var(--title-rotator-ink);
        line-height: 1.08;
        text-align: left;
        overflow: hidden;
        white-space: nowrap;
        vertical-align: 0.02em;
        transition:
          background 200ms ease,
          color 200ms ease;
      }

      .t-resize {
        transition:
          width  var(--resize-dur) var(--resize-ease),
          height var(--resize-dur) var(--resize-ease);
        will-change: width, height;
      }

      .title-rotator.t-resize {
        transition:
          width var(--resize-dur) var(--resize-ease),
          background 200ms ease,
          color 200ms ease;
      }

      .title-rotator[data-tone="bookmark"] {
        --title-rotator-bg: #fef3c7;
        --title-rotator-ink: #d97706;
      }

      .title-rotator[data-tone="history"] {
        --title-rotator-bg: #dbeafe;
        --title-rotator-ink: #2563eb;
      }

      .title-rotator[data-tone="top-sites"] {
        --title-rotator-bg: #dcfce7;
        --title-rotator-ink: #059669;
      }

      .title-rotator[data-tone="settings"] {
        --title-rotator-bg: #fce7f3;
        --title-rotator-ink: #be185d;
      }

      .title-rotator__text {
        line-height: inherit;
      }

      .title-rotator__measure {
        position: absolute;
        visibility: hidden;
        white-space: nowrap;
        pointer-events: none;
      }

      .t-text-swap {
        display: inline-block;
        transform: translateY(0);
        filter: blur(0);
        opacity: 1;
        transition:
          transform var(--text-swap-dur) var(--text-swap-ease),
          filter    var(--text-swap-dur) var(--text-swap-ease),
          opacity   var(--text-swap-dur) var(--text-swap-ease);
        will-change: transform, filter, opacity;
      }
      .t-text-swap.is-exit {
        transform: translateY(calc(var(--text-swap-translate-y) * -1));
        filter: blur(var(--text-swap-blur));
        opacity: 0;
      }
      .t-text-swap.is-enter-start {
        transform: translateY(var(--text-swap-translate-y));
        filter: blur(var(--text-swap-blur));
        opacity: 0;
        transition: none;
      }

      .t-panel-slide {
        transform: translateY(var(--panel-translate-y));
        opacity: 0;
        filter: blur(var(--panel-blur));
        pointer-events: none;
        transition:
          transform var(--panel-close-dur) var(--panel-ease),
          opacity   var(--panel-close-dur) var(--panel-ease),
          filter    var(--panel-close-dur) var(--panel-ease);
        will-change: transform, opacity, filter;
      }
      .t-panel-slide[data-open="true"] {
        transform: translateY(0);
        opacity: 1;
        filter: blur(0);
        pointer-events: auto;
        transition:
          transform var(--panel-open-dur) var(--panel-ease),
          opacity   var(--panel-open-dur) var(--panel-ease),
          filter    var(--panel-open-dur) var(--panel-ease);
      }

      @media (prefers-reduced-motion: reduce) {
        .t-panel-slide { transition: none !important; }
      }

      .title.t-copy-swap,
      .body-copy.t-copy-swap {
        transform: translateY(0);
        filter: blur(0);
        opacity: 1;
        transition:
          transform var(--text-swap-dur) var(--text-swap-ease),
          filter var(--text-swap-dur) var(--text-swap-ease),
          opacity var(--text-swap-dur) var(--text-swap-ease);
        will-change: transform, filter, opacity;
      }

      .title.t-copy-swap.is-exit,
      .body-copy.t-copy-swap.is-exit {
        transform: translateY(calc(var(--text-swap-translate-y) * -1));
        filter: blur(var(--text-swap-blur));
        opacity: 0;
      }

      .title.t-copy-swap.is-enter-start,
      .body-copy.t-copy-swap.is-enter-start {
        transform: translateY(var(--text-swap-translate-y));
        filter: blur(var(--text-swap-blur));
        opacity: 0;
        transition: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .t-resize { transition: none !important; }
        .t-text-swap { transition: none !important; }
        .t-copy-swap { transition: none !important; }
      }

      @media (prefers-color-scheme: dark) {
        .title-logo-mark {
          filter: drop-shadow(0 7px 9px rgba(72, 184, 255, 0.46));
        }

        .title-rotator[data-tone="bookmark"] {
          --title-rotator-bg: rgba(245, 158, 11, 0.22);
          --title-rotator-ink: #fbbf24;
        }

        .title-rotator[data-tone="history"] {
          --title-rotator-bg: rgba(37, 99, 235, 0.24);
          --title-rotator-ink: #93c5fd;
        }

        .title-rotator[data-tone="top-sites"] {
          --title-rotator-bg: rgba(5, 150, 105, 0.24);
          --title-rotator-ink: #86efac;
        }

        .title-rotator[data-tone="settings"] {
          --title-rotator-bg: rgba(219, 39, 119, 0.24);
          --title-rotator-ink: #f9a8d4;
        }
      }

      .body-copy {
        max-width: min(520px, 100%);
        min-height: 0;
        color: var(--page-muted);
        font-size: 16px;
        line-height: 1.58;
        white-space: normal;
        overflow-wrap: break-word;
      }

      .body-note {
        display: block;
        margin-top: 10px;
        color: color-mix(in srgb, var(--page-muted) 82%, var(--page-ink));
        font-size: 14px;
        line-height: 1.55;
      }

      .body-note:empty {
        display: none;
      }

      [data-empty="true"] {
        position: relative;
      }

      [data-empty="true"]::before,
      [data-empty="true"]::after {
        content: "";
        display: block;
        border-radius: 999px;
        background: var(--page-soft);
      }

      .eyebrow[data-empty="true"]::before {
        display: none;
        width: 120px;
        height: 10px;
      }

      .title[data-empty="true"]::before,
      .title[data-empty="true"]::after {
        width: min(100%, 420px);
        height: 24px;
      }

      .title[data-empty="true"]::after {
        width: min(76%, 320px);
        margin-top: 18px;
      }

      .body-copy[data-empty="true"]::before,
      .body-copy[data-empty="true"]::after {
        width: min(100%, 460px);
        height: 12px;
      }

      .body-copy[data-empty="true"]::after {
        width: min(82%, 360px);
        margin-top: 12px;
      }

      .shortcut-label {
        --shortcut-keycap-shadow: #000;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-height: 28px;
        margin: 0 6px;
        vertical-align: middle;
        transform: translateY(-2px);
        line-height: 1;
        white-space: nowrap;
      }

      .shortcut-keycap {
        --keycap-radius: 8px;
        min-width: 24px;
        height: 24px;
        padding: 0 5px;
        border-radius: var(--keycap-radius);
        border: 2px solid #000;
        background: linear-gradient(180deg, #ededed 0%, #fff 100%);
        box-shadow: 0 2px 0 var(--shortcut-keycap-shadow);
        color: #000;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        position: relative;
        z-index: 0;
        overflow: hidden;
        transform-origin: center bottom;
      }

      .shortcut-keycap::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        box-shadow: inset 0 -1px 3px rgba(255, 255, 255, 0.4);
        pointer-events: none;
        z-index: 1;
      }

      @media (prefers-color-scheme: dark) {
        .shortcut-label {
          --shortcut-keycap-shadow: #fff;
        }

        .shortcut-keycap {
          border: 2px solid transparent;
          background:
            linear-gradient(180deg, #5f5f5f 0%, #575757 100%) padding-box,
            linear-gradient(180deg, #f2f2f2 0%, #d9d9d9 100%) border-box;
          color: #fff;
        }

        .shortcut-keycap::after {
          box-shadow: none;
        }
      }

      .interaction-slots {
        width: max-content;
        max-width: 100%;
        align-self: end;
        justify-self: start;
        display: grid;
        gap: 12px;
      }

      .interaction-slots[data-accordion="true"] {
        width: min(420px, 100%);
        min-height: clamp(150px, 32vh, 220px);
        align-content: end;
      }

      .interaction-slot {
        all: unset;
        box-sizing: border-box;
        min-height: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr);
        align-items: start;
        gap: 8px;
        background: transparent;
        color: var(--page-muted);
      }

      .interaction-slot--with-info {
        grid-template-columns: 18px minmax(0, 1fr) 20px;
      }

      .interaction-slot[data-action]:not([data-action=""]):hover {
        color: var(--page-ink);
      }

    <div id="onboarding-root" class="onboarding-shell" data-onboarding-shell data-active-slide="intro" data-active-index="0" data-visual-visible="true">

        <section id="onboarding-copy-panel" class="copy-panel">
          <div class="onboarding-newtab-watermark" aria-hidden="true">
            <span class="onboarding-newtab-watermark__solid"></span>
            <img class="onboarding-newtab-watermark__image" src="../../assets/images/lumno-wordmark.svg" alt="" draggable="false" decoding="async" loading="eager" />
          </div>
          <div class="copy-block">
            <div id="onboarding-page-strip" class="page-strip" role="group" aria-label="Onboarding navigation" hidden></div>
            <p id="onboarding-eyebrow" class="eyebrow" data-empty="true"></p>
            <h1 id="onboarding-title" class="title" data-empty="true"></h1>
            <p id="onboarding-body" class="body-copy" data-empty="true">
              <span id="onboarding-body-prefix"></span><span id="onboarding-shortcut-label" class="shortcut-label"></span><span id="onboarding-body-suffix"></span>
              <span id="onboarding-body-note" class="body-note"></span>
            </p>
          </div>
          <div id="onboarding-interaction-slots" class="interaction-slots" aria-label="Onboarding interaction slots"></div>
          <div class="onboarding-copy-actions" data-visible="true" aria-label="Onboarding actions">
            <button class="onboarding-action-button onboarding-action-button--primary" type="button" data-action="next">
              <span>Get started</span>
              <i class="ri-icon ri-size-14 ri-arrow-right-line" aria-hidden="true"></i>
            </button>
            <button class="onboarding-action-button onboarding-action-button--secondary" type="button" data-action="prev" hidden>
              <span>Back</span>
            </button>
            <button class="onboarding-action-button onboarding-action-button--ghost" type="button" data-action="openShortcuts" hidden>
              <span>Change shortcut</span>
              <i class="ri-icon ri-size-14 ri-external-link-line" aria-hidden="true"></i>
            </button>
          </div>
        </section>

        <section id="onboarding-visual-slot" class="visual-panel-slot" aria-label="Onboarding visual preview">
          <div id="onboarding-visual-panel" class="visual-panel">
            <div id="onboarding-visual-canvas" class="visual-canvas">
              <div id="onboarding-visual-stage" class="visual-stage" data-visual-stage></div>
              <div id="onboarding-cursor-layer" class="cursor-layer" data-cursor-enabled="true" data-cursor-mode="intro"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
